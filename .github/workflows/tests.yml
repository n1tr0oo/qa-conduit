name: QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ═══════════════════════════════════════════════════════════════════════════════
#
#  Job dependency graph (Assignment 3 — updated):
#
#  build ──────────────────────────────────────────────────────────────┐
#                                                                      │
#                              ┌─────────────────────────────────────── ┤
#                              ├─→ unit-tests ──────┐                   │
#                              ├─→ api-tests ───────┤                   │
#                              ├─→ e2e-tests ───────┤                   │
#                              ├─→ mutation-tests ──┤  ← NEW (A3)       │
#                              └─→ chaos-tests ─────┤  ← NEW (A3)       │
#                                                   │                   │
#                              ┌────────────────────┘                   │
#                              │                                        │
#                        allure-report                           performance-tests
#                        (if: always)                            (manual trigger only)
#                        quality-gate
#                        (if: always)
#
#  Stage 1 — build             : install deps, cache, verify structure
#  Stage 2 — functional tests  : unit / api / e2e (unchanged)
#  Stage 2 — mutation-tests    : NEW — slugify mutant injection, score ≥70%
#  Stage 2 — chaos-tests       : NEW — downtime + db-failure (no live server needed)
#  Stage 3 — reporting         : allure-report + quality-gate (updated gates)
#  Stage 4 — perf-tests        : NEW — k6 load tests (manual trigger, needs k6)
#
# ═══════════════════════════════════════════════════════════════════════════════

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 1 — BUILD
  # Installs QA dependencies, caches node_modules, verifies test structure.
  # All test jobs depend on this job and restore from cache — no redundant installs.
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: "Build — Install & Verify"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install QA dependencies
        run: npm install

      - name: Cache QA node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: qa-node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Verify test directory structure
        run: |
          echo "──────────────────────────────────"
          echo " QA Repo — File Structure Check"
          echo "──────────────────────────────────"
          echo "Unit tests:"
          ls tests/unit/
          echo "UI tests:"
          ls tests/ui/
          echo "API collections:"
          ls tests/api/
          echo "Docs:"
          ls docs/
          echo "──────────────────────────────────"
          echo "BUILD VERIFIED"

      - name: Verify Playwright config
        run: node -e "import('./playwright.config.js').then(c => console.log('playwright.config.js OK — projects:', c.default.projects.map(p => p.name).join(', ')))"

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 2 — UNIT TESTS
  # Pure logic tests — no database, no HTTP, no browser.
  # Fastest job (~15 sec). Fails fast if core logic is broken.
  # ════════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: "Test — Unit (node:test)"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore QA node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: qa-node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run unit tests
        run: node --test tests/unit/*.test.mjs

      - name: Generate unit test Allure results
        run: node tests/unit/generate-allure-results.mjs

      - name: Upload Unit Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-unit
          path: allure-results/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 2 — API TESTS (integration level)
  # Starts PostgreSQL + Express backend only (no frontend needed for API tests).
  # Runs two Newman collections: main suite + edge-case suite.
  # Uploads JUnit XML (for quality-gate) and Allure results (for dashboard).
  # ════════════════════════════════════════════════════════════════════════════
  api-tests:
    name: "Test — API Integration (Newman)"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit
          POSTGRES_DB: conduit_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore QA node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: qa-node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # ── App setup ────────────────────────────────────────────────────────
      - name: Clone Conduit app
        run: git clone https://github.com/TonyMckes/conduit-realworld-example-app.git conduit-app

      - name: Install app dependencies
        working-directory: conduit-app
        run: npm install

      - name: Start backend (Express, port 3001)
        working-directory: conduit-app/backend
        env:
          NODE_ENV: development
          PORT: 3001
          JWT_KEY: ci_test_secret_key
          DEV_DB_USERNAME: conduit
          DEV_DB_PASSWORD: conduit
          DEV_DB_NAME: conduit_ci
          DEV_DB_HOSTNAME: localhost
          DEV_DB_DIALECT: postgres
        run: node index.js > /tmp/backend.log 2>&1 &

      - name: Wait for backend
        run: npx wait-on http://localhost:3001/api/tags --timeout 120000

      - name: Show backend log on failure
        if: failure()
        run: cat /tmp/backend.log || echo "No backend log"

      # ── Seed data ────────────────────────────────────────────────────────
      - name: Create test user
        run: |
          curl -s -X POST http://localhost:3001/api/users \
            -H "Content-Type: application/json" \
            -d '{"user":{"username":"qa_test","email":"qa_test@example.com","password":"password123"}}' \
            -o /dev/null -w "Create test user: HTTP %{http_code}\n"

      - name: Create seed article with tag
        run: |
          TOKEN=$(curl -s -X POST http://localhost:3001/api/users/login \
            -H "Content-Type: application/json" \
            -d '{"user":{"email":"qa_test@example.com","password":"password123"}}' \
            | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          curl -s -X POST http://localhost:3001/api/articles \
            -H "Content-Type: application/json" \
            -H "Authorization: Token $TOKEN" \
            -d '{"article":{"title":"QA Seed Article","description":"Seed","body":"Seed body","tagList":["qa"]}}' \
            -o /dev/null -w "Create seed article: HTTP %{http_code}\n"

      # ── Test execution ────────────────────────────────────────────────────
      - name: Run Newman — main API suite (18 requests / 34 assertions)
        run: |
          npx newman run tests/api/conduit.postman_collection.json \
            --reporters cli,junit,allure \
            --reporter-junit-export reports/junit/newman-results.xml \
            --reporter-allure-export allure-results

      - name: Run Newman — edge-case API suite (8 requests / 15 assertions)
        run: |
          npx newman run tests/api/conduit-edge-cases.postman_collection.json \
            --reporters cli,junit,allure \
            --reporter-junit-export reports/junit/newman-edge-results.xml \
            --reporter-allure-export allure-results

      # ── Artifacts ────────────────────────────────────────────────────────
      - name: Upload API JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-api
          path: reports/junit/newman*.xml
          retention-days: 7

      - name: Upload API Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 2 — E2E TESTS (end-to-end / browser level)
  # Starts full stack: PostgreSQL + Express backend + Vite frontend + Chromium.
  # Runs all Playwright specs (smoke, auth, articles, feed, edge-cases).
  # Uploads JUnit XML, HTML report, and Allure results.
  # ════════════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: "Test — E2E Browser (Playwright / Chromium)"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit
          POSTGRES_DB: conduit_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore QA node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: qa-node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # ── App setup ────────────────────────────────────────────────────────
      - name: Clone Conduit app
        run: git clone https://github.com/TonyMckes/conduit-realworld-example-app.git conduit-app

      - name: Install app dependencies
        working-directory: conduit-app
        run: npm install

      - name: Start backend (Express, port 3001)
        working-directory: conduit-app/backend
        env:
          NODE_ENV: development
          PORT: 3001
          JWT_KEY: ci_test_secret_key
          DEV_DB_USERNAME: conduit
          DEV_DB_PASSWORD: conduit
          DEV_DB_NAME: conduit_ci
          DEV_DB_HOSTNAME: localhost
          DEV_DB_DIALECT: postgres
        run: node index.js > /tmp/backend.log 2>&1 &

      - name: Start frontend (Vite, port 3000)
        working-directory: conduit-app
        env:
          VITE_PORT: 3000
        run: npm run dev -w frontend > /tmp/frontend.log 2>&1 &

      - name: Wait for backend and frontend
        run: npx wait-on http://localhost:3001/api/tags http://localhost:3000 --timeout 120000

      - name: Show backend log on failure
        if: failure()
        run: cat /tmp/backend.log || echo "No backend log"

      # ── Seed data ────────────────────────────────────────────────────────
      - name: Create test user
        run: |
          curl -s -X POST http://localhost:3001/api/users \
            -H "Content-Type: application/json" \
            -d '{"user":{"username":"qa_test","email":"qa_test@example.com","password":"password123"}}' \
            -o /dev/null -w "Create test user: HTTP %{http_code}\n"

      - name: Create seed article with tag
        run: |
          TOKEN=$(curl -s -X POST http://localhost:3001/api/users/login \
            -H "Content-Type: application/json" \
            -d '{"user":{"email":"qa_test@example.com","password":"password123"}}' \
            | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          curl -s -X POST http://localhost:3001/api/articles \
            -H "Content-Type: application/json" \
            -H "Authorization: Token $TOKEN" \
            -d '{"article":{"title":"QA Seed Article","description":"Seed","body":"Seed body","tagList":["qa"]}}' \
            -o /dev/null -w "Create seed article: HTTP %{http_code}\n"

      # ── Test execution ────────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (28 tests — chromium)
        run: npx playwright test --project=chromium

      # ── Artifacts ────────────────────────────────────────────────────────
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: reports/html/
          retention-days: 7

      - name: Upload E2E JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-e2e
          path: reports/junit/playwright-results.xml
          retention-days: 7

      - name: Upload E2E Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-e2e
          path: allure-results/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 3 — ALLURE REPORT (dashboard)
  # Downloads Allure result files from api-tests and e2e-tests,
  # merges them into one directory, generates the full HTML dashboard,
  # and uploads it as artifact "allure-dashboard".
  #
  # Open locally: download artifact → unzip → open index.html
  # ════════════════════════════════════════════════════════════════════════════
  allure-report:
    name: "Report — Allure Dashboard"
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, e2e-tests, mutation-tests, chaos-tests]
    if: always()

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore QA node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: qa-node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # ── Download all Allure result artifacts ─────────────────────────────
      - name: Download Unit Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-unit
          path: allure-results/
        continue-on-error: true

      - name: Download API Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
        continue-on-error: true

      - name: Download E2E Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results/
        continue-on-error: true

      # ── Generate Allure HTML report ───────────────────────────────────────
      - name: List merged allure-results
        run: |
          echo "Total result files: $(ls allure-results/ 2>/dev/null | wc -l)"
          ls allure-results/ 2>/dev/null || echo "No results found"

      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Print Allure report summary
        run: |
          echo "──────────────────────────────────────"
          echo " Allure Report Generated"
          echo "──────────────────────────────────────"
          echo "Files: $(ls allure-report/ | wc -l)"
          echo "Size:  $(du -sh allure-report/ | cut -f1)"
          echo "──────────────────────────────────────"

      # ── Upload final dashboard ────────────────────────────────────────────
      - name: Upload Allure dashboard
        uses: actions/upload-artifact@v4
        with:
          name: allure-dashboard
          path: allure-report/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 3 — QUALITY GATE
  # Downloads JUnit XML from api-tests and e2e-tests.
  # Checks numeric thresholds; reads unit-tests job result directly.
  # Exits 1 (blocks merge) if any gate fails.
  # Publishes results to GitHub "Test Results" tab via dorny/test-reporter.
  # ════════════════════════════════════════════════════════════════════════════
  quality-gate:
    name: "Gate — Quality Thresholds"
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, e2e-tests, mutation-tests, chaos-tests]
    if: always()
    permissions:
      checks: write
      contents: read

    steps:
      - name: Download API JUnit results
        uses: actions/download-artifact@v4
        with:
          name: junit-api
          path: reports/junit/
        continue-on-error: true

      - name: Download E2E JUnit results
        uses: actions/download-artifact@v4
        with:
          name: junit-e2e
          path: reports/junit/
        continue-on-error: true

      - name: Verify quality gate thresholds
        run: |
          echo "════════════════════════════════════════"
          echo "        QUALITY GATE THRESHOLD CHECK    "
          echo "════════════════════════════════════════"
          echo " Gate  | Threshold        | Result"
          echo "────────────────────────────────────────"

          GATE_FAILED=0

          # ── QG01: Unit Tests (job-level result) ──────────────────────────
          UNIT_RESULT="${{ needs.unit-tests.result }}"
          if [ "$UNIT_RESULT" = "success" ]; then
            echo " QG01  | Unit tests pass  | PASSED ($UNIT_RESULT)"
          else
            echo " QG01  | Unit tests pass  | FAILED ($UNIT_RESULT)"
            GATE_FAILED=1
          fi

          # ── QG02: E2E Tests (Playwright JUnit XML) ───────────────────────
          if [ -f reports/junit/playwright-results.xml ]; then
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/junit/playwright-results.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/junit/playwright-results.xml | head -1)
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/junit/playwright-results.xml | head -1)
            FAILURES=${FAILURES:-0}; ERRORS=${ERRORS:-0}; TESTS=${TESTS:-0}
            TOTAL_FAIL=$((FAILURES + ERRORS))
            if [ "$TOTAL_FAIL" -eq 0 ]; then
              echo " QG02  | E2E 100% pass    | PASSED ($TESTS tests, 0 failures)"
            else
              echo " QG02  | E2E 100% pass    | FAILED ($TESTS tests, $FAILURES failures, $ERRORS errors)"
              GATE_FAILED=1
            fi
          else
            echo " QG02  | E2E 100% pass    | FAILED (no result file)"
            GATE_FAILED=1
          fi

          # ── QG03: API Main Suite (Newman JUnit XML) ──────────────────────
          if [ -f reports/junit/newman-results.xml ]; then
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/junit/newman-results.xml | head -1)
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/junit/newman-results.xml | head -1)
            FAILURES=${FAILURES:-0}; TESTS=${TESTS:-0}
            if [ "$FAILURES" -eq 0 ]; then
              echo " QG03  | API 100% pass    | PASSED ($TESTS assertions, 0 failures)"
            else
              echo " QG03  | API 100% pass    | FAILED ($TESTS assertions, $FAILURES failures)"
              GATE_FAILED=1
            fi
          else
            echo " QG03  | API 100% pass    | FAILED (no result file)"
            GATE_FAILED=1
          fi

          # ── QG04: API Edge-Case Suite (Newman JUnit XML) ─────────────────
          if [ -f reports/junit/newman-edge-results.xml ]; then
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/junit/newman-edge-results.xml | head -1)
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/junit/newman-edge-results.xml | head -1)
            FAILURES=${FAILURES:-0}; TESTS=${TESTS:-0}
            if [ "$FAILURES" -eq 0 ]; then
              echo " QG04  | Edge 100% pass   | PASSED ($TESTS assertions, 0 failures)"
            else
              echo " QG04  | Edge 100% pass   | FAILED ($TESTS assertions, $FAILURES failures)"
              GATE_FAILED=1
            fi
          else
            echo " QG04  | Edge 100% pass   | FAILED (no result file)"
            GATE_FAILED=1
          fi

          # ── QG05: Mutation Tests ─────────────────────────────────────────
          MUTATION_RESULT="${{ needs.mutation-tests.result }}"
          if [ "$MUTATION_RESULT" = "success" ]; then
            echo " QG05  | Mutation score ≥70% | PASSED ($MUTATION_RESULT)"
          else
            echo " QG05  | Mutation score ≥70% | FAILED ($MUTATION_RESULT)"
            GATE_FAILED=1
          fi

          # ── QG06: Chaos Tests ────────────────────────────────────────────
          CHAOS_RESULT="${{ needs.chaos-tests.result }}"
          if [ "$CHAOS_RESULT" = "success" ]; then
            echo " QG06  | Chaos tests pass  | PASSED ($CHAOS_RESULT)"
          else
            echo " QG06  | Chaos tests pass  | FAILED ($CHAOS_RESULT)"
            GATE_FAILED=1
          fi

          echo "────────────────────────────────────────"
          if [ "$GATE_FAILED" -eq 1 ]; then
            echo " RESULT → QUALITY GATE FAILED — deploy blocked"
            echo "════════════════════════════════════════"
            exit 1
          else
            echo " RESULT → ALL QUALITY GATES PASSED — deploy allowed"
            echo "════════════════════════════════════════"
          fi

      - name: Publish test results to GitHub UI
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (All Suites)
          path: reports/junit/*.xml
          reporter: java-junit
          fail-on-error: false

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 2 — MUTATION TESTS (Assignment 3)
  # Pure Node.js — no database, no HTTP server needed.
  # Injects 10 mutants into the slugify function and runs the unit test suite
  # against each. Fails the job if mutation score drops below 70%.
  # ════════════════════════════════════════════════════════════════════════════
  mutation-tests:
    name: "Test — Mutation (slugify, score ≥70%)"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore QA node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: qa-node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run manual mutation tests (slugify — 10 mutants)
        run: node tests/mutation/run-mutation-tests.mjs --verbose

      - name: Run Stryker mutation tests (53 mutants — vitest runner)
        run: npx stryker run

      - name: Upload mutation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 2 — CHAOS TESTS (Assignment 3)
  # Tests that do not require the live Express backend:
  #   - api-downtime   : verifies ECONNREFUSED is returned gracefully
  #   - db-failure     : mock server returns 500/503; checks JSON error format
  # Network-latency and resource-exhaustion require a live backend so they
  # are skipped in CI (run locally with `npm run test:chaos:latency`).
  # ════════════════════════════════════════════════════════════════════════════
  chaos-tests:
    name: "Test — Chaos / Fault Injection (offline scenarios)"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore QA node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: qa-node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run chaos — API downtime scenario
        run: node tests/chaos/api-downtime.mjs

      - name: Run chaos — Database failure scenario
        run: node tests/chaos/db-failure.mjs

      - name: Upload chaos report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chaos-report
          path: reports/chaos/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 4 — PERFORMANCE TESTS (Assignment 3)
  # Requires k6 CLI and a live backend. Triggered manually via workflow_dispatch
  # to avoid running on every push (expensive and environment-dependent).
  # ════════════════════════════════════════════════════════════════════════════
  performance-tests:
    name: "Test — Performance (K6 load tests)"
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, e2e-tests, mutation-tests, chaos-tests]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit
          POSTGRES_DB: conduit_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: Clone & start Conduit backend
        run: |
          git clone https://github.com/TonyMckes/conduit-realworld-example-app.git conduit-app
          cd conduit-app && npm install
        env:
          NODE_ENV: development
          PORT: 3001
          JWT_KEY: ci_test_secret_key
          DEV_DB_USERNAME: conduit
          DEV_DB_PASSWORD: conduit
          DEV_DB_NAME: conduit_ci
          DEV_DB_HOSTNAME: localhost
          DEV_DB_DIALECT: postgres

      - name: Start backend
        working-directory: conduit-app/backend
        env:
          NODE_ENV: development
          PORT: 3001
          JWT_KEY: ci_test_secret_key
          DEV_DB_USERNAME: conduit
          DEV_DB_PASSWORD: conduit
          DEV_DB_NAME: conduit_ci
          DEV_DB_HOSTNAME: localhost
          DEV_DB_DIALECT: postgres
        run: node index.js > /tmp/backend.log 2>&1 &

      - name: Wait for backend
        run: npx wait-on http://localhost:3001/api/tags --timeout 120000

      - name: Seed test user
        run: |
          curl -s -X POST http://localhost:3001/api/users \
            -H "Content-Type: application/json" \
            -d '{"user":{"username":"qa_test","email":"qa_test@example.com","password":"password123"}}' \
            -o /dev/null -w "HTTP %{http_code}\n"

      - name: Run K6 — Auth load test (normal)
        run: |
          mkdir -p tests/performance/results
          k6 run --env SCENARIO=normal \
            --out json=tests/performance/results/auth-normal.json \
            tests/performance/k6/auth-load-test.js
        continue-on-error: true

      - name: Run K6 — Feed load test (normal)
        run: |
          k6 run --env SCENARIO=normal \
            --out json=tests/performance/results/feed-normal.json \
            tests/performance/k6/feed-load-test.js
        continue-on-error: true

      - name: Run K6 — Articles load test (normal)
        run: |
          k6 run --env SCENARIO=normal \
            --out json=tests/performance/results/articles-normal.json \
            tests/performance/k6/articles-load-test.js
        continue-on-error: true

      - name: Run K6 — Full scenario (spike)
        run: |
          k6 run --env SCENARIO=spike \
            --out json=tests/performance/results/full-spike.json \
            tests/performance/k6/full-scenario.js
        continue-on-error: true

      - name: Upload K6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-performance-results
          path: tests/performance/results/
          retention-days: 14
